name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.15.2
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean --skip=publish' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release image tag
        if: github.event_name != 'workflow_dispatch'
        run: echo "RELEASE_IMAGE_TAG=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Phase 7.6 — Scan the freshly pushed GHCR image. HIGH/CRITICAL
      # fixable vulns fail the release; unfixable upstream CVEs are
      # tolerated (ignore-unfixed) so a stuck upstream doesn't block a
      # tag push. Pinned to commit SHA of aquasecurity/trivy-action@v0.35.0
      # (the only safe tag after the March 2026 supply-chain compromise).
      - name: Trivy — scan GHCR image
        if: github.event_name != 'workflow_dispatch'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ghcr.io/deploy-monster/deploy-monster:${{ env.RELEASE_IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
