name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v1.18.1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.15.2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Phase 7.6 — Scan the freshly pushed GHCR image. HIGH/CRITICAL
      # fixable vulns fail the release; unfixable upstream CVEs are
      # tolerated (ignore-unfixed) so a stuck upstream doesn't block a
      # tag push. Pinned to commit SHA of aquasecurity/trivy-action@v0.35.0
      # (the only safe tag after the March 2026 supply-chain compromise).
      - name: Trivy — scan GHCR image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/deploy-monster/deploy-monster:latest
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
