name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          mkdir -p internal/api/static
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26'
          cache: true

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610
        with:
          syft-version: v1.18.1

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89
        with:
          distribution: goreleaser
          version: v2.15.2
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean --skip=publish' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke release archive
        shell: bash
        run: |
          set -euo pipefail

          archive="$(find dist -maxdepth 1 -name 'deploymonster_*_linux_amd64.tar.gz' | sort | head -n1)"
          if [[ -z "$archive" ]]; then
            echo "linux amd64 release archive not found"
            exit 1
          fi

          grep " $(basename "$archive")$" dist/checksums.txt | (cd dist && sha256sum --check -)

          tmp="$(mktemp -d)"
          tar -xzf "$archive" -C "$tmp"
          test -x "$tmp/deploymonster"
          test -s "$tmp/LICENSE"
          test -s "$tmp/README.md"
          test -s "$tmp/monster.example.yaml"

          version_output="$("$tmp/deploymonster" version)"
          echo "$version_output"
          "$tmp/deploymonster" help >/dev/null

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            expected="${GITHUB_REF_NAME#v}"
            grep -F "DeployMonster $expected" <<< "$version_output"
          fi

      - name: Derive release image tag
        if: github.event_name != 'workflow_dispatch'
        run: echo "RELEASE_IMAGE_TAG=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Phase 7.6 — Scan the freshly pushed GHCR image. HIGH/CRITICAL
      # fixable vulns fail the release; unfixable upstream CVEs are
      # tolerated (ignore-unfixed) so a stuck upstream doesn't block a
      # tag push. Pinned to commit SHA of aquasecurity/trivy-action@v0.35.0
      # (the only safe tag after the March 2026 supply-chain compromise).
      - name: Trivy — scan GHCR image
        if: github.event_name != 'workflow_dispatch'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: ghcr.io/deploy-monster/deploy-monster:${{ env.RELEASE_IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
