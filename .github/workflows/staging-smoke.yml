name: Staging Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Staging base URL. Falls back to repository variable STAGING_BASE_URL.'
        required: false
        default: ''
      public_only:
        description: 'Run only public health/spec/marketplace checks.'
        required: false
        default: 'false'
        type: boolean
      insecure_tls:
        description: 'Allow self-signed staging TLS certificates.'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  smoke:
    name: Staging Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate staging smoke inputs
        shell: bash
        env:
          STAGING_BASE_URL: ${{ inputs.base_url || vars.STAGING_BASE_URL }}
          DM_SMOKE_PUBLIC_ONLY: ${{ inputs.public_only && '1' || '0' }}
          DM_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
          DM_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${STAGING_BASE_URL:-}" ]]; then
            echo "::error::Set workflow input base_url or repository variable STAGING_BASE_URL."
            exit 2
          fi

          if [[ "${DM_SMOKE_PUBLIC_ONLY:-0}" != "1" ]]; then
            if [[ -z "${DM_SMOKE_EMAIL:-}" || -z "${DM_SMOKE_PASSWORD:-}" ]]; then
              echo "::error::Set STAGING_SMOKE_EMAIL and STAGING_SMOKE_PASSWORD secrets, or rerun with public_only=true."
              exit 2
            fi
          fi

      - name: Run staging smoke
        env:
          STAGING_BASE_URL: ${{ inputs.base_url || vars.STAGING_BASE_URL }}
          DM_SMOKE_PUBLIC_ONLY: ${{ inputs.public_only && '1' || '0' }}
          DM_SMOKE_INSECURE_TLS: ${{ inputs.insecure_tls && '1' || '0' }}
          DM_SMOKE_REQUIRE_BASE_URL: '1'
          DM_SMOKE_EMAIL: ${{ secrets.STAGING_SMOKE_EMAIL }}
          DM_SMOKE_PASSWORD: ${{ secrets.STAGING_SMOKE_PASSWORD }}
        run: scripts/staging-smoke.sh
