name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      capture_db_gate_baseline:
        description: 'Recapture writers-under-load baseline on this runner (DM_DB_GATE_UPDATE=1) — OVERWRITES internal/db/testdata/concurrent_writes_baseline.json'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      # tests/loadtest and tests/soak are load-test harnesses (their
      # *test files are 1-line smoke tests that exist only so the
      # binaries compile under `go test`). Counting them in the
      # denominator drags the total ~1.7 pp below the real library
      # coverage without representing any uncovered production code.
      # Strip them from the profile before the threshold check and
      # keep the raw file as an upload artifact for anyone who wants
      # the full picture.
      - name: Filter harness packages from coverage
        run: |
          grep -v '/tests/loadtest\|/tests/soak' coverage.out > coverage.filtered.out || true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.filtered.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding load/soak harnesses): ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 85" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 85% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

      # Phase 7.10 writers-under-load gate. Runs the 64-worker
      # DeploymentStore.Create fan-out against the committed p95 baseline
      # and fails on >10 % regression. Baseline captured on GH runner
      # (ubuntu-latest 2-vCPU) on 2026-04-30 — p95=187878µs, 933 ops/s.
      # To re-capture: CI workflow_dispatch capture_db_gate_baseline=true.
      - name: Writers-under-load gate
        env:
          DM_DB_GATE: "1"
          DM_DB_GATE_VERBOSE: "1"
          DM_DB_GATE_UPDATE: ${{ inputs.capture_db_gate_baseline == 'true' && '1' || '0' }}
        run: go test -run TestStore_ConcurrentWrites_BaselineGate -v ./internal/db/

  test-react:
    name: React Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Run Vitest
        working-directory: web
        run: pnpm test

      # Build + bundle-size gate. Catches regressions where something
      # heavy gets eagerly imported into the main entry chunk (budget
      # 300 KB gzipped; current baseline ~8 KB). Runs here rather than
      # in the main build job because we already have the full pnpm
      # install warmed up.
      - name: Build
        working-directory: web
        run: pnpm run build

      - name: Bundle-size budget
        working-directory: web
        run: pnpm run check:bundle

  test-e2e:
    name: E2E Tests
    needs: [test, test-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build React UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - name: Build server
        run: go build -o bin/deploymonster ./cmd/deploymonster

      - name: Start server
        run: |
          ./bin/deploymonster serve &
          sleep 3
        env:
          MONSTER_HOST: 127.0.0.1
          MONSTER_PORT: 8443
          MONSTER_SECRET: ci-e2e-secret-key-with-at-least-32-characters
          MONSTER_DB_PATH: ${{ runner.temp }}/deploymonster-e2e.db
          MONSTER_ADMIN_EMAIL: admin@deploymonster.test
          MONSTER_ADMIN_PASSWORD: TestPassword123!

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8443/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Install Playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://localhost:8443

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: web/e2e-report/
          retention-days: 7

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 gives us full history for the main-branch scan and
      # for PR log-opts that reference origin/<base_ref>.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Pin the gitleaks binary by version + SHA256 rather than using
      # gitleaks-action. Two reasons:
      #   1) gitleaks-action requires GITLEAKS_LICENSE for organizations,
      #      even on public repos, and the license is a paid SKU.
      #   2) A raw binary download pinned by SHA256 is a stronger supply
      #      chain than an action pinned by commit SHA — the SHA256 covers
      #      the compiled artifact, not just the source repo state.
      - name: Install gitleaks v8.30.1
        run: |
          set -euo pipefail
          VERSION=8.30.1
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          EXPECTED_SHA256=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -sSL -o gitleaks.tar.gz "$URL"
          echo "${EXPECTED_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # On PRs scan only the commits added since the base branch — fast
      # and focused on what the PR author is introducing.
      # On push to main scan full git history so a rebased or reverted
      # secret from the past doesn't slip through just because the diff
      # happens to look clean.
      - name: Run gitleaks
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR mode — scanning origin/${{ github.base_ref }}..HEAD"
            gitleaks git \
              --config .gitleaks.toml \
              --log-opts="origin/${{ github.base_ref }}..HEAD" \
              --redact \
              --verbose \
              .
          else
            echo "Push mode — scanning full history on ${{ github.ref_name }}"
            gitleaks git \
              --config .gitleaks.toml \
              --redact \
              --verbose \
              .
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go vet (integration tag)
        run: go vet -tags integration ./...

      - name: Go vet (pgintegration tag)
        run: go vet -tags pgintegration ./...

      - name: Go build
        run: go build ./...

      # Fails on drift between internal/api/router.go and docs/openapi.yaml.
      # Known gaps are parked in docs/openapi-drift-allowlist.txt; stale
      # allowlist entries (drift has been closed but the line remains) also
      # fail the job so the allowlist cannot rot silently. To regenerate
      # during a spec sync, run: `make openapi-bootstrap`.
      - name: OpenAPI drift check
        run: make openapi-check

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # SQLite end-to-end CRUD test runs against a fresh file-backed
      # database and mirrors the Postgres pgintegration test flow so
      # both store implementations stay in sync. Catches migration
      # drift, schema changes, and Tx-helper regressions without
      # needing a DB service container.
      - name: Run SQLite integration test
        run: go test -tags integration -run TestSQLiteIntegration -v ./internal/db/...

      # Self-signed certificate + TLS server flow — no external deps.
      - name: Run SSL integration test
        run: go test -tags integration -run TestSSLIntegration -v ./internal/ingress/...

      # API smoke test — full app startup health check.
      - name: Run API integration test
        run: go test -tags integration -run TestFullAppStartup -v ./internal/api/...

      # Master <-> agent full protocol round-trip. Spins up a real
      # AgentServer and a real AgentClient on loopback and walks every
      # message type (ping, metrics.collect, container.*, health.check).
      # Catches regressions in the JSON wire protocol, pending-response
      # routing, and graceful shutdown coordination.
      - name: Run master/agent integration test
        run: go test -tags integration -race -run TestMasterAgent_Integration -v ./internal/swarm/...

      # Let's Encrypt staging smoke test. Opt-in via repository variable
      # LE_STAGING_TEST=1 so scheduled or manual runs exercise the full
      # ACME Discover+Register+NewOrder path against real staging. Default
      # PR/push runs skip it to protect the 50/3h new-account rate limit.
      - name: Run Let's Encrypt staging integration test
        if: ${{ vars.LE_STAGING_TEST == '1' }}
        env:
          LE_STAGING_TEST: '1'
        run: go test -tags integration -run TestLetsEncryptStaging -v ./internal/ingress/...

  test-integration-postgres:
    name: Postgres Integration Tests
    runs-on: ubuntu-latest
    # A real postgres:17 side-car the same store contract test flow runs
    # against. Paired with internal/db/sqlite_integration_test.go via
    # internal/db/store_contract_test.go so both backends go through the
    # identical end-to-end CRUD path on every push.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: deploymonster
          POSTGRES_PASSWORD: deploymonster
          POSTGRES_DB: deploymonster_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U deploymonster -d deploymonster_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U deploymonster > /dev/null 2>&1; then
              echo "Postgres ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i)"
            sleep 1
          done
          echo "Postgres never became ready"
          exit 1

      # Run the shared store contract test flow against the pgx/v5
      # backend. Exercises migration runner, all 12 sub-store interfaces,
      # CreateTenantWithDefaults transaction path, unique-constraint
      # rollback safety, and connection pool configuration.
      - name: Run Postgres integration test
        env:
          TEST_POSTGRES_DSN: 'postgres://deploymonster:deploymonster@localhost:5432/deploymonster_test?sslmode=disable'
        run: go test -tags pgintegration -race -run TestPostgresIntegration -v ./internal/db/...

  build:
    name: Build
    needs: [test, test-react, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build React UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o bin/deploymonster-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/deploymonster

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: deploymonster-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/deploymonster-*

  docker:
    name: Docker
    needs: [test, test-react, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image (full build from source)
        run: docker build -t deploymonster:latest -f deployments/Dockerfile .

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
