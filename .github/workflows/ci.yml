name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 85" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 85% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  test-react:
    name: React Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: web
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Run Vitest
        working-directory: web
        run: pnpm test

  test-e2e:
    name: E2E Tests
    needs: [test, test-react]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build React UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - name: Build server
        run: go build -o bin/deploymonster ./cmd/deploymonster

      - name: Start server
        run: |
          ./bin/deploymonster serve &
          sleep 3
        env:
          MONSTER_SERVER_ADDRESS: :8443
          MONSTER_DATABASE_DRIVER: sqlite

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8443/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: pnpm test:e2e
        env:
          E2E_BASE_URL: http://localhost:8443

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: web/e2e-report/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go vet (integration tag)
        run: go vet -tags integration ./...

      - name: Go build
        run: go build ./...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # SQLite end-to-end CRUD test runs against a fresh file-backed
      # database and mirrors the Postgres pgintegration test flow so
      # both store implementations stay in sync. Catches migration
      # drift, schema changes, and Tx-helper regressions without
      # needing a DB service container.
      - name: Run SQLite integration test
        run: go test -tags integration -run TestSQLiteIntegration -v ./internal/db/...

      # Self-signed certificate + TLS server flow — no external deps.
      - name: Run SSL integration test
        run: go test -tags integration -run TestSSLIntegration -v ./internal/ingress/...

      # API smoke test — full app startup health check.
      - name: Run API integration test
        run: go test -tags integration -run TestFullAppStartup -v ./internal/api/...

      # Master <-> agent full protocol round-trip. Spins up a real
      # AgentServer and a real AgentClient on loopback and walks every
      # message type (ping, metrics.collect, container.*, health.check).
      # Catches regressions in the JSON wire protocol, pending-response
      # routing, and graceful shutdown coordination.
      - name: Run master/agent integration test
        run: go test -tags integration -race -run TestMasterAgent_Integration -v ./internal/swarm/...

      # Let's Encrypt staging smoke test. Opt-in via repository variable
      # LE_STAGING_TEST=1 so scheduled or manual runs exercise the full
      # ACME Discover+Register+NewOrder path against real staging. Default
      # PR/push runs skip it to protect the 50/3h new-account rate limit.
      - name: Run Let's Encrypt staging integration test
        if: ${{ vars.LE_STAGING_TEST == '1' }}
        env:
          LE_STAGING_TEST: '1'
        run: go test -tags integration -run TestLetsEncryptStaging -v ./internal/ingress/...

  build:
    name: Build
    needs: [test, test-react, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build React UI
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Copy UI to embed dir
        run: |
          rm -rf internal/api/static/*
          cp -r web/dist/* internal/api/static/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$DATE" \
            -o bin/deploymonster-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/deploymonster

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: deploymonster-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/deploymonster-*

  docker:
    name: Docker
    needs: [test, test-react, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t deploymonster:latest .

  release:
    name: Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
