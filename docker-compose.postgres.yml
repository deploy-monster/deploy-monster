# PostgreSQL development configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up
#
# SECURITY NOTE: Set POSTGRES_PASSWORD environment variable before running
# Example: export POSTGRES_PASSWORD=$(openssl rand -base64 32)

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: deploymonster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deploymonster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-deploymonster}
    volumes:
      - pg-data:/var/lib/postgresql/data
    # SECURITY FIX: Remove host port binding - use internal Docker network only
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deploymonster}"]
      interval: 5s
      timeout: 5s
      retries: 5

  deploymonster:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MONSTER_DATABASE_DRIVER=postgres
      - MONSTER_DATABASE_URL=postgres://${POSTGRES_USER:-deploymonster}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-deploymonster}?sslmode=disable

volumes:
  pg-data:
    driver: local
