# PostgreSQL development configuration
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: deploymonster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: deploymonster
      POSTGRES_PASSWORD: deploymonster
      POSTGRES_DB: deploymonster
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploymonster"]
      interval: 5s
      timeout: 5s
      retries: 5

  deploymonster:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MONSTER_DATABASE_DRIVER=postgres
      - MONSTER_DATABASE_URL=postgres://deploymonster:deploymonster@postgres:5432/deploymonster?sslmode=disable

volumes:
  pg-data:
    driver: local
