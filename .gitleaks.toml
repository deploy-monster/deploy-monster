# gitleaks config — extends the built-in ruleset.
#
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml
#
# Keep this file minimal: only allowlist things that are DEMONSTRABLY fake
# (placeholder PEM bodies like MIIE..., obvious dummy tokens). Every entry
# needs a comment pointing at the file + what it's masking so a reviewer can
# tell a legitimate allowlist from a weaponized one.

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for test fixtures and documented examples"

paths = [
    # Built SPA assets. Vendored third-party JS/CSS gets flagged on every
    # release bump when e.g. a library ships a UUID that looks like a token.
    # The scan already covers the source tree under web/src/ and the Go code
    # that embeds these, so re-scanning the minified bundle adds noise
    # without catching anything new.
    '''internal/api/static/.*''',

    # Example config file — all values are placeholders. The real one
    # (monster.yaml) is git-ignored.
    '''monster\.example\.yaml''',

    # Test files. Every `_test.go` under internal/ and every `.test.ts(x)`
    # under web/src/ uses high-entropy literals for JWT signing keys, HMAC
    # secrets, vault master secrets, mock API keys, etc. These are
    # generated by hand, often ≥32 bytes, and trip the default
    # generic-API-key heuristic on every run. Allowlisting test suffixes
    # is the idiomatic gitleaks pattern — the threat model (accidental
    # commit of a real production secret) is dominated by non-test code
    # where secrets have no reason to appear at all.
    '''.*_test\.go$''',
    '''web/src/.*\.test\.tsx?$''',
    '''web/src/.*__tests__/.*\.tsx?$''',
    '''web/e2e/.*\.ts$''',

    # API usage documentation. The curl-auth-header rule fires on every
    # example that shows how to pass a bearer token or API key header,
    # even when the payload is literally "dm_your_api_key_here". Flagging
    # documentation would make the scan useless to developers writing
    # docs.
    '''docs/examples/.*\.md$''',

    # Runtime-generated bootstrap credentials file. Not tracked by git
    # (see .gitignore line 40), but present in dev working trees after
    # the server's first run. CI uses `gitleaks git` (history scan), so
    # the file never reaches the scanner there; this entry keeps
    # `gitleaks dir` clean for local contributors.
    '''internal/auth/\.credentials$''',
]

regexes = [
    # Placeholder PEM bodies used in handler tests. Real PEM payloads are
    # long base64 blobs; these are "MIIB..." / "MIIE..." truncations that
    # cannot ever decode to a valid key. Narrow enough that a real key
    # accidentally committed would still get flagged.
    '''MIIB\.\.\.''',
    '''MIIE\.\.\.''',

    # Fake-JWT literals used in auth tests (see internal/api/middleware/
    # jwt_test.go and friends). Signed with the string "test-secret" — not
    # a valid production key on any environment.
    '''eyJhbGciOiJIUzI1NiIs[A-Za-z0-9_\-\.]*''',

    # AWS-published canonical example key (AKIAIOSFODNN7EXAMPLE +
    # wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY). Documented as a dummy
    # credential in AWS SDK examples — used in backup tests to assert
    # store-round-trip behaviour without ever touching S3.
    '''AKIAIOSFODNN7EXAMPLE''',
    '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',

    # Obvious-fake Stripe test placeholder in config_test.go + .env.example.
    # Real Stripe live keys are 32+ base62 chars after the prefix; "abc123"
    # and "..." are conventional documentation stand-ins.
    '''sk_live_abc123''',
    '''sk_live_\.\.\.''',

    # Test-fixture secrets. Gitleaks' default generic-API-key heuristic
    # flags any high-entropy 32+ char string assigned to a `secret` /
    # `password` / `key` field, which catches every test JWT signing key
    # and webhook secret in the repo. Narrow the allowlist to literals
    # that *contain* the word "test", "fake", "dummy", "example", or
    # "changeme" — a real secret that contained one of those would already
    # be broken as a secret, so the false-negative risk is zero.
    '''(?i)(test|fake|dummy|example|changeme|placeholder)[-_]?(secret|key|password|token|jwt)''',
    '''(?i)(secret|key|password|token|jwt)[-_]?(test|fake|dummy|example|changeme|placeholder)''',
]
