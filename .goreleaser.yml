version: 2

project_name: deploymonster

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1

builds:
  - id: deploymonster
    main: ./cmd/deploymonster
    binary: deploymonster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - monster.example.yaml

sboms:
  - artifacts: archive
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.sbom.json"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

dockers_v2:
  - id: deploymonster
    ids:
      - deploymonster
    images:
      - "ghcr.io/deploy-monster/deploy-monster"
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
    sbom: false
    labels:
      org.opencontainers.image.title: DeployMonster
      org.opencontainers.image.description: Self-hosted PaaS — single binary, modular monolith, event-driven
      org.opencontainers.image.url: https://deploy.monster
      org.opencontainers.image.source: https://github.com/deploy-monster/deploy-monster
      org.opencontainers.image.vendor: ECOSTACK TECHNOLOGY OÜ
      org.opencontainers.image.licenses: AGPL-3.0
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
    flags:
      - "--pull=true"
      - "--provenance=false"

release:
  github:
    owner: deploy-monster
    name: deploy-monster
  draft: false
  prerelease: auto
  make_latest: "{{ if .Prerelease }}false{{ else }}true{{ end }}"
  name_template: "DeployMonster v{{.Version}}"
  header: |
    ## DeployMonster v{{.Version}}

    Self-hosted PaaS — single binary, zero configuration, production-ready.
  footer: |
    **Full Changelog**: https://github.com/deploy-monster/deploy-monster/compare/{{ .PreviousTag }}...{{ .Tag }}

    ---
    Built by [ECOSTACK TECHNOLOGY OÜ](https://ecostack.ee)
