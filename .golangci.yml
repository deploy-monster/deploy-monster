run:
  timeout: 5m
  tests: false

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  staticcheck:
    checks: ["all", "-SA1029"]
  misspell:
    locale: US

issues:
  exclude-rules:
    # Handlers use responseWriter errors that can't be meaningfully checked
    - path: "^internal/api/handlers/"
      linters: [errcheck, unused, staticcheck, unconvert, bodyclose]
    # Backup module uses stub implementations
    - path: "^internal/backup/"
      linters: [errcheck]
    # openapi-gen tool binary
    - path: "^cmd/openapi-gen/"
      linters: [errcheck]
    # Load/soak test harnesses — binary compile smoke tests, not real tests
    - path: "tests/soak/"
      linters: [errcheck, unused]
    - path: "tests/loadtest/"
      linters: [errcheck, unused]
