run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - bodyclose
  disable:
    - exhaustive
    - wrapcheck
    - gomnd

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  staticcheck:
    checks: ["all", "-SA1029"]
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
    - path: internal/api/handlers/
      linters:
        - errcheck
    - path: mock_test\.go
      linters:
        - unused
  max-issues-per-linter: 50
  max-same-issues: 10
