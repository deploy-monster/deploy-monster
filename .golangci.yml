run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - exhaustive
    - wrapcheck
    - gomnd

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: internal/api/handlers/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
