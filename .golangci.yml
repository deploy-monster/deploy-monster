version: 2

run:
  timeout: 5m
  tests: false

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  staticcheck:
    checks: ["all", "-SA1029"]
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: "internal/api/handlers"
      linters:
        - errcheck
        - unused
        - staticcheck
        - unconvert
    - path: "internal/backup"
      linters:
        - errcheck
    - path: "tests"
      linters:
        - errcheck
        - unused
    - path: "cmd/openapi-gen"
      linters:
        - errcheck
