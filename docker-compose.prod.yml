version: "3.8"

# Production docker-compose with security hardening

services:
  deploymonster:
    image: deploymonster/deploymonster:latest
    container_name: deploymonster
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dm-data:/var/lib/deploymonster
    environment:
      - MONSTER_DOMAIN=${MONSTER_DOMAIN}
      - MONSTER_SECRET=${MONSTER_SECRET}
      - MONSTER_ACME_EMAIL=${MONSTER_ACME_EMAIL}
      - MONSTER_REGISTRATION_MODE=${MONSTER_REGISTRATION_MODE:-invite}
    read_only: true
    tmpfs:
      - /tmp:size=100M
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8443/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

volumes:
  dm-data:
    driver: local
