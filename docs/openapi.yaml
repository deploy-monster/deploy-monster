  /api/v1/topology/compile:
    post:
      operationId: compileTopology
      tags: [Topology]
      summary: Compile topology into Docker Compose
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Topology"
