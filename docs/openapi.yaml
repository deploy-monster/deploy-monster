  # ── MCP ──────────────────────────────────────────────
  /mcp/v1/tools:
    get:
      operationId: listMCPTools
      tags: [Admin]
      summary: List available MCP tools
      responses:
        "200":
          description: MCP tool list

  /mcp/v1/tools/{name}:
    post:
      operationId: invokeMCPTool
      tags: [Admin]
      summary: Invoke an MCP tool
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
