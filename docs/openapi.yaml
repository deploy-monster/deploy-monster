                      total_apps:
                        type: integer
                      running_apps:
                        type: integer
                      total_deployments:
                        type: integer
                      total_domains:
                        type: integer

  # ── Billing (usage history) ──────────────────────────
  /api/v1/billing/usage/history:
    get:
      operationId: getUsageHistory
      tags: [Billing]
      summary: Get usage history over a time period
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [24h, 7d, 30d]
            default: 24h
      responses:
        "200":
          description: Usage history
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id:
                    type: string
                  period:
                    type: string
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        hour:
                          type: string
                          format: date-time
                        cpu_seconds:
                          type: number
                        ram_mb_hours:
                          type: number
                        bandwidth_mb:
                          type: number
                        build_seconds:
                          type: number
                  count:
                    type: integer

  # ── Certificates ─────────────────────────────────────
  /api/v1/certificates:
    get:
      operationId: listCertificates
      tags: [Certificates]
      summary: List SSL certificates for the tenant
      responses:
        "200":
          description: Certificate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        tenant_id:
                          type: string
                        domain:
                          type: string
                        issuer:
                          type: string
                        expires_at:
                          type: string
                          format: date-time
                        auto_renew:
                          type: boolean
                        status:
                          type: string
                          enum: [active, expired, pending]
                  total:
                    type: integer
    post:
      operationId: uploadCertificate
      tags: [Certificates]
      summary: Upload a custom SSL certificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain_id, cert_pem, key_pem]
              properties:
                domain_id:
                  type: string
                cert_pem:
                  type: string
                  description: PEM-encoded certificate
                key_pem:
                  type: string
                  description: PEM-encoded private key
      responses:
        "201":
          description: Certificate uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  domain_id:
                    type: string
                  issuer:
                    type: string
                  status:
                    type: string
        "400":
          description: Invalid certificate or key

  /api/v1/certificates/wildcard:
    post:
      operationId: requestWildcardCertificate
      tags: [Certificates]
      summary: Request a wildcard SSL certificate
      responses:
        "201":
          description: Wildcard certificate requested

  # ── Deploy Freeze ────────────────────────────────────
  /api/v1/deploy/freeze:
    get:
      operationId: listDeployFreezes
      tags: [Deployments]
      summary: List deploy freeze windows
      responses:
        "200":
          description: Freeze windows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        reason:
                          type: string
                        starts_at:
                          type: string
                          format: date-time
                        ends_at:
                          type: string
                          format: date-time
                        active:
                          type: boolean
                  frozen:
                    type: boolean
                    description: True if any active window currently covers now
    post:
      operationId: createDeployFreeze
      tags: [Deployments]
      summary: Create a deploy freeze window
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                  description: Defaults to now
                ends_at:
                  type: string
                  format: date-time
                  description: Defaults to starts_at + 24h
      responses:
        "201":
          description: Freeze window created
        "409":
          description: Freeze window limit reached (50 max per tenant)

  /api/v1/deploy/freeze/{id}:
    delete:
      operationId: deleteDeployFreeze
      tags: [Deployments]
      summary: Delete (deactivate) a deploy freeze window
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Freeze window deactivated

  # ── DNS Records ──────────────────────────────────────
  /api/v1/dns/records:
    get:
      operationId: listDnsRecords
      tags: [Domains]
      summary: List DNS records for a domain
      parameters:
        - name: domain
          in: query
          required: true
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
            default: cloudflare
      responses:
        "200":
          description: DNS records
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                  provider:
                    type: string
                  verified:
                    type: boolean
                  data:
                    type: array
                  total:
                    type: integer
        "400":
          description: Missing domain parameter
    post:
      operationId: createDnsRecord
      tags: [Domains]
      summary: Create a DNS record
      parameters:
        - name: provider
          in: query
          schema:
            type: string
            default: cloudflare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, name, value]
              properties:
                type:
                  type: string
                  enum: [A, AAAA, CNAME, TXT]
                name:
                  type: string
                  maxLength: 253
                value:
                  type: string
                  maxLength: 2048
                ttl:
                  type: integer
                  default: 300
                proxied:
                  type: boolean
                  default: false
      responses:
        "201":
          description: DNS record created

  /api/v1/dns/records/{id}:
    delete:
      operationId: deleteDnsRecord
      tags: [Domains]
      summary: Delete a DNS record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
            default: cloudflare
      responses:
        "204":
          description: DNS record deleted

  # ── App Bulk Operations ──────────────────────────────
  /api/v1/apps/bulk:
    post:
      operationId: bulkAppAction
      tags: [Apps]
      summary: Perform a bulk action on multiple apps (max 50)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, app_ids]
              properties:
                action:
                  type: string
                  enum: [start, stop, restart, delete]
                app_ids:
                  type: array
                  items:
                    type: string
                  maxItems: 50
      responses:
        "200":
          description: Bulk action completed (may include partial failures)
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        app_id:
                          type: string
                        status:
                          type: string
                          enum: [started, stopped, restarted, deleted, error]
                        error:
                          type: string
                  total:
                    type: integer
                  succeeded:
                    type: integer
                  failed:
                    type: integer
                  rolled_back:
                    type: boolean
                  message:
                    type: string
        "400":
          description: Invalid request (missing action/app_ids, too many apps)

  # ── App Import / Export ──────────────────────────────
  /api/v1/apps/import:
    post:
      operationId: importApp
      tags: [Apps]
      summary: Import an application from a manifest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, source_type, source_url]
              properties:
                name:
                  type: string
                  maxLength: 64
                type:
                  type: string
                  enum: [web, worker, static, cron, docker, compose, database, service]
                source_type:
                  type: string
                  enum: [git, github, gitlab, image, tarball, docker, dockerfile]
                source_url:
                  type: string
                branch:
                  type: string
                dockerfile:
                  type: string
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
                domains:
                  type: array
                  items:
                    type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 100
      responses:
        "201":
          description: App imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  app_id:
                    type: string
                  name:
                    type: string
                  domains_created:
                    type: integer
                  domains_failed:
                    type: integer
        "400":
          description: Invalid manifest

  /api/v1/apps/{id}/export:
    get:
      operationId: exportApp
      tags: [Apps]
      summary: Export an application as a manifest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: App manifest
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  name:
                    type: string
                  type:
                    type: string
                  source_type:
                    type: string
                  source_url:
                    type: string
                  branch:
                    type: string
                  env_vars:
                    type: object
                  domains:
                    type: array
                    items:
                      type: string
                  labels:
                    type: object
                  replicas:
                    type: integer
        "404":
          description: App not found

