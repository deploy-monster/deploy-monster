      responses:
        "200":
          description: Topology saved

  /api/v1/topology/{projectId}/{environment}:
    get:
      operationId: getTopology
      tags: [Topology]
      summary: Get topology for a project environment
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: environment
          in: path
          required: true
          schema:
            type: string
            enum: [development, staging, production]
      responses:
        "200":
          description: Topology configuration
          content:
            application/json:
              schema:
