openapi: 3.0.3
info:
  title: DeployMonster API
  version: 1.4.0
  description: |
    Self-hosted PaaS API for managing applications, deployments, domains,
    secrets, teams, and infrastructure. Single binary, modular monolith
    with event-driven architecture.
  contact:
    name: DeployMonster
    url: https://deploy.monster
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8443
    description: Local development server
  - url: https://{host}
    description: Production server
    variables:
      host:
        default: deploy.monster

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Apps
    description: Application lifecycle management
  - name: Deployments
    description: Deployment history and triggers
  - name: Domains
    description: Custom domain configuration
  - name: Compose
    description: Docker Compose stack management
  - name: Databases
    description: Managed database provisioning
  - name: Backups
    description: Backup creation and restore
  - name: Servers
    description: Server provisioning and management
  - name: Git
    description: Git provider integration
  - name: Secrets
    description: Encrypted secret vault
  - name: Billing
    description: Plans and usage tracking
  - name: Team
    description: Team roles, invites, and audit log
  - name: Marketplace
    description: One-click application marketplace
  - name: Topology
    description: Visual topology editor and deployment
  - name: Admin
    description: System administration and tenant management
  - name: Webhooks
    description: Outbound webhook management
  - name: Notifications
    description: Notification channel management
  - name: Search
    description: Global search and activity feed
  - name: Health
    description: System health checks
  - name: Metrics
    description: Prometheus metrics endpoints

paths:
  # ── Health ────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  modules:
                    type: object
                    additionalProperties:
                      type: string

  # ── Auth ──────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                name:
                  type: string
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "409":
          description: Email already registered

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh an expired access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
    patch:
      operationId: updateProfile
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"

  # ── Apps ──────────────────────────────────────────────
  /api/v1/apps:
    get:
      operationId: listApps
      tags: [Apps]
      summary: List all applications
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/App"
                  total:
                    type: integer
    post:
      operationId: createApp
      tags: [Apps]
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                git_url:
                  type: string
                branch:
                  type: string
                  default: main
                build_pack:
                  type: string
                  enum: [dockerfile, buildpacks, static, nixpacks]
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"

  /api/v1/apps/{id}:
    get:
      operationId: getApp
      tags: [Apps]
      summary: Get application details
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateApp
      tags: [Apps]
      summary: Update application configuration
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                git_url:
                  type: string
                branch:
                  type: string
                build_pack:
                  type: string
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"
    delete:
      operationId: deleteApp
      tags: [Apps]
      summary: Delete an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Application deleted

  /api/v1/apps/{id}/start:
    post:
      operationId: startApp
      tags: [Apps]
      summary: Start an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application started

  /api/v1/apps/{id}/stop:
    post:
      operationId: stopApp
      tags: [Apps]
      summary: Stop an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application stopped

  /api/v1/apps/{id}/restart:
    post:
      operationId: restartApp
      tags: [Apps]
      summary: Restart an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application restarted

  /api/v1/apps/{id}/deploy:
    post:
      operationId: triggerDeploy
      tags: [Deployments]
      summary: Trigger a new deployment
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                commit:
                  type: string
                  description: Specific commit SHA to deploy
                force:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Deployment triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deployment"

  /api/v1/apps/{id}/env:
    get:
      operationId: getEnvVars
      tags: [Apps]
      summary: Get application environment variables
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Environment variables
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: string
    put:
      operationId: updateEnvVars
      tags: [Apps]
      summary: Replace all environment variables
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Environment variables updated

  /api/v1/apps/{id}/logs:
    get:
      operationId: getAppLogs
      tags: [Apps]
      summary: Get application logs
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: lines
          in: query
          schema:
            type: integer
            default: 100
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Application logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  # ── Deployments ───────────────────────────────────────
  /api/v1/apps/{id}/deployments:
    get:
      operationId: listDeployments
      tags: [Deployments]
      summary: List deployments for an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Deployment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Deployment"

  /api/v1/apps/{id}/rollback:
    post:
      operationId: rollbackApp
      tags: [Deployments]
      summary: Rollback to a previous deployment version
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version:
                  type: string
      responses:
        "200":
          description: Rollback initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deployment"

  # ── Domains ───────────────────────────────────────────
  /api/v1/domains:
    get:
      operationId: listDomains
      tags: [Domains]
      summary: List all custom domains
      responses:
        "200":
          description: Domain list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Domain"
    post:
      operationId: createDomain
      tags: [Domains]
      summary: Add a custom domain to an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id, domain]
              properties:
                app_id:
                  type: string
                  format: uuid
                domain:
                  type: string
                  example: app.example.com
                auto_ssl:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Domain added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Domain"

  /api/v1/domains/{id}:
    delete:
      operationId: deleteDomain
      tags: [Domains]
      summary: Remove a custom domain
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Domain removed

  /api/v1/domains/{id}/verify:
    post:
      operationId: verifyDomain
      tags: [Domains]
      summary: Verify DNS configuration for a domain
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string

  # ── Compose Stacks ────────────────────────────────────
  /api/v1/stacks:
    post:
      operationId: deployStack
      tags: [Compose]
      summary: Deploy a Docker Compose stack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, compose]
              properties:
                name:
                  type: string
                compose:
                  type: string
                  description: Raw docker-compose.yml content
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Stack deployment started

  /api/v1/stacks/validate:
    post:
      operationId: validateStack
      tags: [Compose]
      summary: Validate a Docker Compose file without deploying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compose]
              properties:
                compose:
                  type: string
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string

  # ── Secrets ───────────────────────────────────────────
  /api/v1/secrets:
    get:
      operationId: listSecrets
      tags: [Secrets]
      summary: List all secrets (values masked)
      responses:
        "200":
          description: Secret list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
    post:
      operationId: createSecret
      tags: [Secrets]
      summary: Create or update a secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, value]
              properties:
                name:
                  type: string
                  pattern: "^[A-Z_][A-Z0-9_]*$"
                value:
                  type: string
      responses:
        "201":
          description: Secret created

  # ── Billing ───────────────────────────────────────────
  /api/v1/billing/plans:
    get:
      operationId: listPlans
      tags: [Billing]
      summary: List available billing plans
      security: []
      responses:
        "200":
          description: Plan list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        price_monthly:
                          type: number
                        limits:
                          type: object
                          properties:
                            apps:
                              type: integer
                            domains:
                              type: integer
                            team_members:
                              type: integer

  /api/v1/billing/usage:
    get:
      operationId: getUsage
      tags: [Billing]
      summary: Get current billing period usage
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      apps:
                        type: integer
                      domains:
                        type: integer
                      deployments_this_month:
                        type: integer
                      storage_bytes:
                        type: integer
                      bandwidth_bytes:
                        type: integer

  # ── Team ──────────────────────────────────────────────
  /api/v1/team/roles:
    get:
      operationId: listRoles
      tags: [Team]
      summary: List available team roles
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        permissions:
                          type: array
                          items:
                            type: string

  /api/v1/team/invites:
    post:
      operationId: createInvite
      tags: [Team]
      summary: Invite a new team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
      responses:
        "201":
          description: Invite sent

  /api/v1/team/audit-log:
    get:
      operationId: getAuditLog
      tags: [Team]
      summary: Get team audit log
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        user_id:
                          type: string
                        action:
                          type: string
                        resource:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        details:
                          type: object

  # ── Auth (additional) ──────────────────────────────────
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Logout and clear session cookies
      responses:
        "200":
          description: Logged out successfully

  /api/v1/auth/sessions:
    get:
      operationId: listSessions
      tags: [Auth]
      summary: List all active sessions for the current user
      description: |
        Returns every session (refresh token) currently associated with
        the authenticated user, marking the one that originated the
        current request with `current: true`. Used by the "Active
        sessions" UI in account settings (SESS-005).
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        ip:
                          type: string
                        user_agent:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        last_seen_at:
                          type: string
                          format: date-time
                        current:
                          type: boolean
        "401":
          description: Not authenticated

  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      tags: [Auth]
      summary: Revoke every session for the current user
      description: |
        Invalidates all refresh tokens for the authenticated user plus
        the current access token (SESS-005). The intended use is the
        account-settings "Sign out of all devices" button and the
        post-password-change forced re-auth.
      responses:
        "200":
          description: All sessions logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: all sessions logged out
        "401":
          description: Not authenticated

  /api/v1/auth/change-password:
    post:
      operationId: changePassword
      tags: [Auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Databases ────────────────────────────────────────
  /api/v1/databases/engines:
    get:
      operationId: listDatabaseEngines
      tags: [Databases]
      summary: List available database engines and versions
      responses:
        "200":
          description: Available engines
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DatabaseEngine"

  /api/v1/databases:
    post:
      operationId: createDatabase
      tags: [Databases]
      summary: Create a managed database instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, engine, version]
              properties:
                name:
                  type: string
                engine:
                  type: string
                  enum: [postgres, mysql, mariadb, redis, mongo]
                version:
                  type: string
                size_gb:
                  type: integer
                  default: 10
      responses:
        "201":
          description: Database created

  # ── Backups ──────────────────────────────────────────
  /api/v1/backups:
    get:
      operationId: listBackups
      tags: [Backups]
      summary: List all backups
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Backup list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Backup"
    post:
      operationId: createBackup
      tags: [Backups]
      summary: Create a new backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id]
              properties:
                app_id:
                  type: string
                  format: uuid
                label:
                  type: string
      responses:
        "202":
          description: Backup started

  /api/v1/backups/{key}/download:
    get:
      operationId: downloadBackup
      tags: [Backups]
      summary: Download a backup archive
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ── Servers ──────────────────────────────────────────
  /api/v1/servers/providers:
    get:
      operationId: listServerProviders
      tags: [Servers]
      summary: List available VPS providers
      security: []
      responses:
        "200":
          description: Provider list

  /api/v1/servers/providers/{provider}/regions:
    get:
      operationId: listProviderRegions
      tags: [Servers]
      summary: List regions for a VPS provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Region list

  /api/v1/servers/providers/{provider}/sizes:
    get:
      operationId: listProviderSizes
      tags: [Servers]
      summary: List available server sizes for a VPS provider
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Size list

  /api/v1/servers/provision:
    post:
      operationId: provisionServer
      tags: [Servers]
      summary: Provision a new server via VPS provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, region, size]
              properties:
                provider:
                  type: string
                region:
                  type: string
                size:
                  type: string
                name:
                  type: string
      responses:
        "202":
          description: Server provisioning started

  /api/v1/servers/test-ssh:
    post:
