openapi: 3.0.3
info:
  title: DeployMonster API
  version: 1.4.0
  description: |
    Self-hosted PaaS API for managing applications, deployments, domains,
    secrets, teams, and infrastructure. Single binary, modular monolith
    with event-driven architecture.
  contact:
    name: DeployMonster
    url: https://deploy.monster
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html

servers:
  - url: http://localhost:8443
    description: Local development server
  - url: https://{host}
    description: Production server
    variables:
      host:
        default: deploy.monster

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Apps
    description: Application lifecycle management
  - name: Deployments
    description: Deployment history and triggers
  - name: Domains
    description: Custom domain configuration
  - name: Compose
    description: Docker Compose stack management
  - name: Databases
    description: Managed database provisioning
  - name: Backups
    description: Backup creation and restore
  - name: Servers
    description: Server provisioning and management
  - name: Git
    description: Git provider integration
  - name: Secrets
    description: Encrypted secret vault
  - name: Billing
    description: Plans and usage tracking
  - name: Team
    description: Team roles, invites, and audit log
  - name: Marketplace
    description: One-click application marketplace
  - name: Topology
    description: Visual topology editor and deployment
  - name: Admin
    description: System administration and tenant management
  - name: Webhooks
    description: Outbound webhook management
  - name: Notifications
    description: Notification channel management
  - name: Search
    description: Global search and activity feed
  - name: Health
    description: System health checks
  - name: Metrics
    description: Prometheus metrics endpoints

paths:
  # ── Health ────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]
                  version:
                    type: string
                  modules:
                    type: object
                    additionalProperties:
                      type: string

  /api/v1/health:
    get:
      operationId: getApiHealth
      tags: [Health]
      summary: API health check (alias)
      security: []
      responses:
        "200":
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, degraded]

  /health/detailed:
    get:
      operationId: getHealthDetailed
      tags: [Health]
      summary: Detailed health check with per-module status
      security: []
      responses:
        "200":
          description: All modules healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded]
                  version:
                    type: string
                  checks:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        status:
                          type: string
                          enum: [ok, degraded, down]
                        healthy:
                          type: boolean
                  duration:
                    type: string
        "503":
          description: One or more modules degraded or down

  /readyz:
    get:
      operationId: getReadyz
      tags: [Health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: System is ready to accept traffic
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ready]
        "503":
          description: System is draining or dependencies are unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [draining, not_ready]
                  reasons:
                    type: array
                    items:
                      type: string

  # ── Auth ──────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                  minLength: 8
                name:
                  type: string
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "409":
          description: Email already registered

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh an expired access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"
    patch:
      operationId: updateProfile
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/User"

  # ── Apps ──────────────────────────────────────────────
  /api/v1/apps:
    get:
      operationId: listApps
      tags: [Apps]
      summary: List all applications
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/App"
                  total:
                    type: integer
    post:
      operationId: createApp
      tags: [Apps]
      summary: Create a new application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                git_url:
                  type: string
                branch:
                  type: string
                  default: main
                build_pack:
                  type: string
                  enum: [dockerfile, buildpacks, static, nixpacks]
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"

  /api/v1/apps/{id}:
    get:
      operationId: getApp
      tags: [Apps]
      summary: Get application details
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateApp
      tags: [Apps]
      summary: Update application configuration
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                git_url:
                  type: string
                branch:
                  type: string
                build_pack:
                  type: string
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/App"
    delete:
      operationId: deleteApp
      tags: [Apps]
      summary: Delete an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Application deleted

  /api/v1/apps/{id}/start:
    post:
      operationId: startApp
      tags: [Apps]
      summary: Start an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application started

  /api/v1/apps/{id}/stop:
    post:
      operationId: stopApp
      tags: [Apps]
      summary: Stop an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application stopped

  /api/v1/apps/{id}/restart:
    post:
      operationId: restartApp
      tags: [Apps]
      summary: Restart an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Application restarted

  /api/v1/apps/{id}/deploy:
    post:
      operationId: triggerDeploy
      tags: [Deployments]
      summary: Trigger a new deployment
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                commit:
                  type: string
                  description: Specific commit SHA to deploy
                force:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Deployment triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deployment"

  /api/v1/apps/{id}/env:
    get:
      operationId: getEnvVars
      tags: [Apps]
      summary: Get application environment variables
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Environment variables
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: string
    put:
      operationId: updateEnvVars
      tags: [Apps]
      summary: Replace all environment variables
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Environment variables updated

  /api/v1/apps/{id}/logs:
    get:
      operationId: getAppLogs
      tags: [Apps]
      summary: Get application logs
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: lines
          in: query
          schema:
            type: integer
            default: 100
        - name: since
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Application logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  # ── Deployments ───────────────────────────────────────
  /api/v1/apps/{id}/deployments:
    get:
      operationId: listDeployments
      tags: [Deployments]
      summary: List deployments for an application
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Deployment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Deployment"

  /api/v1/apps/{id}/rollback:
    post:
      operationId: rollbackApp
      tags: [Deployments]
      summary: Rollback to a previous deployment version
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version:
                  type: string
      responses:
        "200":
          description: Rollback initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Deployment"

  # ── App configuration (per-app ingress and container settings) ──
  /api/v1/apps/{id}/ports:
    get:
      operationId: getAppPorts
      tags: [Apps]
      summary: List declared port mappings
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Port mappings
    put:
      operationId: updateAppPorts
      tags: [Apps]
      summary: Replace the app's port mappings
      description: |
        Cap: 100 mappings per app. `host_port` must be 0..65535;
        `protocol` must be `tcp` or `udp`. Validated at ingress
        (see security-report/input-validation-audit.md).
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  container_port:
                    type: integer
                  host_port:
                    type: integer
                  protocol:
                    type: string
                    enum: [tcp, udp]
      responses:
        "200":
          description: Port mappings updated
        "400":
          description: Validation error (out-of-range port, unknown protocol, >100 mappings)

  /api/v1/apps/{id}/healthcheck:
    get:
      operationId: getAppHealthcheck
      tags: [Apps]
      summary: Get the app's healthcheck configuration
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Healthcheck config
    put:
      operationId: updateAppHealthcheck
      tags: [Apps]
      summary: Update the app's healthcheck configuration
      description: |
        Caps: interval <= 3600 s, timeout <= 300 s, retries <= 100,
        path <= 2048 chars, port 0..65535.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: [http, tcp, cmd]
                path:
                  type: string
                port:
                  type: integer
                interval:
                  type: integer
                timeout:
                  type: integer
                retries:
                  type: integer
      responses:
        "200":
          description: Healthcheck config updated
        "400":
          description: Validation error

  /api/v1/apps/{id}/labels:
    get:
      operationId: getAppLabels
      tags: [Apps]
      summary: Get app labels/tags
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Labels map
    put:
      operationId: updateAppLabels
      tags: [Apps]
      summary: Replace the app's labels (Kubernetes-style)
      description: |
        Caps: <= 64 labels, key <= 63 chars, value <= 253 chars.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Labels updated
        "400":
          description: Validation error (oversize key / value / count)

  /api/v1/apps/{id}/log-retention:
    get:
      operationId: getAppLogRetention
      tags: [Apps]
      summary: Get log-retention configuration
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Log retention config
    put:
      operationId: updateAppLogRetention
      tags: [Apps]
      summary: Update log-retention configuration
      description: |
        Caps: max_size_mb <= 10240 (10 GB), max_files <= 100,
        driver in {json-file, local, syslog}.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_size_mb:
                  type: integer
                max_files:
                  type: integer
                driver:
                  type: string
                  enum: [json-file, local, syslog]
      responses:
        "200":
          description: Log retention config updated
        "400":
          description: Validation error

  /api/v1/apps/{id}/response-headers:
    get:
      operationId: getAppResponseHeaders
      tags: [Apps]
      summary: Get custom response headers
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Response headers config
    put:
      operationId: updateAppResponseHeaders
      tags: [Apps]
      summary: Update custom response headers
      description: |
        Custom header names must match RFC 7230 token grammar
        (letters, digits, and `!#$%&'*+-.^_` `|~`). Values reject
        CR/LF (header-splitting defense). Caps: 50 custom headers,
        4096 chars per value.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hsts:
                  type: string
                csp:
                  type: string
                x_frame_options:
                  type: string
                x_content_type:
                  type: string
                referrer_policy:
                  type: string
                permissions_policy:
                  type: string
                custom:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "200":
          description: Response headers updated
        "400":
          description: Validation error (invalid header name or CRLF in value)

  /api/v1/apps/{id}/sticky-sessions:
    get:
      operationId: getAppStickySessions
      tags: [Apps]
      summary: Get sticky-session (load-balancer affinity) config
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Sticky-session config
    put:
      operationId: updateAppStickySessions
      tags: [Apps]
      summary: Update sticky-session config
      description: |
        Cookie name must match the RFC 6265 token grammar
        (header-splitting defense — see the sticky_sessions
        regression test). `same_site` in {lax, strict, none}.
        `max_age` capped at one year.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
                cookie:
                  type: string
                max_age:
                  type: integer
                same_site:
                  type: string
                  enum: [lax, strict, none]
      responses:
        "200":
          description: Sticky-session config updated
        "400":
          description: Validation error

  /api/v1/apps/{id}/error-pages:
    get:
      operationId: getAppErrorPages
      tags: [Apps]
      summary: Get custom error pages (502/503/504/maintenance)
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Error pages config
    put:
      operationId: updateAppErrorPages
      tags: [Apps]
      summary: Update custom error pages
      description: |
        Each page body is capped at 1 MB inside the global 10 MB
        request envelope.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                page_502:
                  type: string
                page_503:
                  type: string
                page_504:
                  type: string
                page_maintenance:
                  type: string
      responses:
        "200":
          description: Error pages updated
        "400":
          description: Validation error (>1 MB per page)

  /api/v1/apps/{id}/redirects:
    get:
      operationId: listAppRedirects
      tags: [Apps]
      summary: List redirect / rewrite rules for the app
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Redirect rule list
    post:
      operationId: createAppRedirect
      tags: [Apps]
      summary: Add a redirect / rewrite rule
      description: |
        `status_code` must be one of {301, 302, 307, 308}. Source
        and destination each capped at 2048 chars. Limit: 200 rules
        per app.
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, destination]
              properties:
                source:
                  type: string
                destination:
                  type: string
                type:
                  type: string
                  enum: [redirect, rewrite]
                status_code:
                  type: integer
                  enum: [301, 302, 307, 308]
      responses:
        "201":
          description: Redirect rule created
        "400":
          description: Validation error (invalid status_code, oversize source/destination)
        "409":
          description: Redirect rule limit reached (200 per app)

  /api/v1/apps/{id}/redirects/{ruleId}:
    delete:
      operationId: deleteAppRedirect
      tags: [Apps]
      summary: Delete a redirect rule
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Redirect rule deleted

  # ── Domains ───────────────────────────────────────────
  /api/v1/domains:
    get:
      operationId: listDomains
      tags: [Domains]
      summary: List all custom domains
      responses:
        "200":
          description: Domain list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Domain"
    post:
      operationId: createDomain
      tags: [Domains]
      summary: Add a custom domain to an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [app_id, domain]
              properties:
                app_id:
                  type: string
                  format: uuid
                domain:
                  type: string
                  example: app.example.com
                auto_ssl:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Domain added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Domain"

  /api/v1/domains/{id}:
    delete:
      operationId: deleteDomain
      tags: [Domains]
      summary: Remove a custom domain
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "204":
          description: Domain removed

  /api/v1/domains/{id}/verify:
    post:
      operationId: verifyDomain
      tags: [Domains]
      summary: Verify DNS configuration for a domain
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string

  # ── Compose Stacks ────────────────────────────────────
  /api/v1/stacks:
    post:
      operationId: deployStack
      tags: [Compose]
      summary: Deploy a Docker Compose stack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, compose]
              properties:
                name:
                  type: string
                compose:
                  type: string
                  description: Raw docker-compose.yml content
                env_vars:
                  type: object
                  additionalProperties:
                    type: string
      responses:
        "202":
          description: Stack deployment started

  /api/v1/stacks/validate:
    post:
      operationId: validateStack
      tags: [Compose]
      summary: Validate a Docker Compose file without deploying
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
