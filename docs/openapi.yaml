  /api/v1/marketplace/{slug}:
    get:
      operationId: getMarketplaceApp
      tags: [Marketplace]
      summary: Get marketplace application details
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application details
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/marketplace/deploy:
    post:
      operationId: deployMarketplaceApp
