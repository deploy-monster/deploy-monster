  # ── Dashboard ─────────────────────────────────────────
  /api/v1/dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [Apps]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total_apps:
                        type: integer
                      running_apps:
                        type: integer
                      total_deployments:
                        type: integer
                      total_domains:
                        type: integer

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/v1/auth/login
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key generated from admin panel

  parameters:
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Resource identifier
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: invalid or expired token
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: not found

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, developer, viewer]
        tenant_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        plan:
          type: string
        owner_id:
          type: string
          format: uuid
        settings:
          type: object
        created_at:
          type: string
          format: date-time

    App:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [running, stopped, deploying, failed, suspended]
        git_url:
          type: string
        branch:
          type: string
        build_pack:
          type: string
          enum: [dockerfile, buildpacks, static, nixpacks]
        image:
          type: string
        replicas:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Domain:
      type: object
      properties:
        id:
          type: string
          format: uuid
        app_id:
          type: string
          format: uuid
        domain:
          type: string
          example: app.example.com
        ssl_enabled:
          type: boolean
        ssl_expires_at:
          type: string
          format: date-time
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        app_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, building, deploying, running, failed, rolled_back]
        commit_sha:
          type: string
        commit_message:
          type: string
        version:
          type: string
        triggered_by:
          type: string
          format: uuid
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        duration_ms:
          type: integer
        created_at:
          type: string
          format: date-time

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token TTL in seconds

    DatabaseEngine:
      type: object
      properties:
        engine:
          type: string
          enum: [postgres, mysql, mariadb, redis, mongo]
        versions:
          type: array
          items:
            type: string
        default_version:
          type: string
        default_port:
          type: integer

    Backup:
      type: object
      properties:
        key:
          type: string
        app_id:
          type: string
          format: uuid
        label:
          type: string
        size:
          type: integer
        storage:
          type: string
          enum: [local, s3]
        created_at:
          type: string
          format: date-time

    Topology:
      type: object
      properties:
        project_id:
          type: string
        environment:
          type: string
          enum: [development, staging, production]
        apps:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              git_url:
                type: string
              branch:
                type: string
              build_pack:
                type: string
              port:
                type: integer
              replicas:
                type: integer
        databases:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              engine:
                type: string
              version:
                type: string
              size_gb:
                type: integer
        domains:
          type: array
          items:
            type: object
            properties:
              fqdn:
                type: string
              ssl_enabled:
                type: boolean
        volumes:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              size_gb:
                type: integer
              mount_path:
                type: string
        connections:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              type:
                type: string
                enum: [dependency, connection, dns]
