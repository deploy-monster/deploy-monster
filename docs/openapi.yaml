  # ── Auth (additional) ──────────────────────────────────
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Logout and clear session cookies
      responses:
        "200":
          description: Logged out successfully

  /api/v1/auth/sessions:
    get:
      operationId: listSessions
      tags: [Auth]
      summary: List all active sessions for the current user
      description: |
        Returns every session (refresh token) currently associated with
        the authenticated user, marking the one that originated the
        current request with `current: true`. Used by the "Active
        sessions" UI in account settings (SESS-005).
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        ip:
                          type: string
                        user_agent:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        last_seen_at:
                          type: string
                          format: date-time
                        current:
                          type: boolean
        "401":
          description: Not authenticated

  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      tags: [Auth]
      summary: Revoke every session for the current user
      description: |
        Invalidates all refresh tokens for the authenticated user plus
        the current access token (SESS-005). The intended use is the
        account-settings "Sign out of all devices" button and the
        post-password-change forced re-auth.
      responses:
        "200":
          description: All sessions logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: all sessions logged out
        "401":
          description: Not authenticated

  /api/v1/auth/change-password:
    post:
      operationId: changePassword
      tags: [Auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"

