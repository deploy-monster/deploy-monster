                  caddyfile:
                    type: string
                  env_file:
                    type: string

  /api/v1/topology/validate:
    post:
      operationId: validateTopology
      tags: [Topology]
      summary: Validate a topology configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Topology"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  errors:
                    type: array
                    items:
                      type: string

  /api/v1/topology/deploy:
    post:
      operationId: deployTopology
      tags: [Topology]
      summary: Deploy a topology configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, environment]
              properties:
                project_id:
                  type: string
                environment:
                  type: string
                dry_run:
                  type: boolean
                  default: false
      responses:
        "202":
          description: Deployment started

  /api/v1/topology/templates:
    get:
